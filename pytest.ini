[pytest]
minversion = 7.0
testpaths = tests tests_ui
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --html=report.html
    --self-contained-html
markers =
    smoke: critical happy-path tests run on every commit
    regression: full-suite tests run before release
    negative: tests asserting the API fails correctly
    crud: tests for create/read/update/delete endpoints
    ui: browser-based tests using Playwright
