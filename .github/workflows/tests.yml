name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to push to gh-pages

jobs:

  python-tests:
    name: Python (Pytest + Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run Pytest suite (API + UI)
        run: pytest -v

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: report.html

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

  java-tests:
    name: Java (RestAssured + JUnit 5)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        working-directory: java-tests
        run: mvn -B test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: java-tests/target/surefire-reports/

  performance-smoke:
    name: Performance Smoke (Locust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Locust headless smoke test (5 users, 20 seconds)
        run: |
          locust -f performance/locustfile.py \
            --host https://jsonplaceholder.typicode.com \
            --users 5 --spawn-rate 1 --run-time 20s --headless \
            --html locust-report.html \
            --csv locust-stats

      - name: Upload Locust report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-performance-report
          path: |
            locust-report.html
            locust-stats*.csv

  allure-report:
    name: Allure Report → GitHub Pages
    runs-on: ubuntu-latest
    needs: python-tests
    if: always()
    steps:
      - name: Checkout gh-pages history (if it exists)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download Allure raw results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Set up JDK (Allure CLI needs Java)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.34.1
          wget -qO allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH

      - name: Copy history from previous report (for trends)
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p allure-results/history
            cp -R gh-pages/history/* allure-results/history/ || true
          fi

      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: false
